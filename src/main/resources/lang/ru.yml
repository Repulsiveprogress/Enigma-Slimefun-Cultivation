# Cultivation language file (Russian).

command:
  invalid_subcommand: "Укажите корректную подкоманду."
  player_only: "Команду может выполнить только игрок"
  packpeek:
    must_hold: "Для этой команды нужно держать в руке Пакет семян"
    empty: "Этот пакет пуст!"
    contents: "Содержимое"
    level: "Ур"
    speed: "Ск"
    strength: "См"

items:
  CLT_TREE_BANANA:
    name: "Культивационное дерево: Банан"
    lore:
      - "Дерево, которое растит пальцы. Жуть!"
  CLT_TREE_LEMON:
    name: "Культивационное дерево: Лимон"
    lore:
      - "Даже смотреть на это дерево кисло."
  CLT_TREE_ORANGE:
    name: "Культивационное дерево: Апельсин"
    lore:
      - "Маленькие солнечные шарики."
  CLT_TREE_GREEN_APPLE:
    name: "Культивационное дерево: Зелёное яблоко"
    lore:
      - "Вырастает большое и хрустящее зелёное яблоко."
  CLT_TREE_PINEAPPLE:
    name: "Культивационное дерево: Ананас"
    lore:
      - "ГДЕ МОЯ ПИЦЦА?!"
  CLT_TREE_MANGO:
    name: "Культивационное дерево: Манго"
    lore:
      - "Лучше всего — в самый момент зрелости."
  CLT_TREE_PEACH:
    name: "Культивационное дерево: Персик"
    lore:
      - "Джеймс искал именно это, кажется?"
  CLT_TREE_APRICOT:
    name: "Культивационное дерево: Абрикос"
    lore:
      - "Внутри — единственная косточка отчаяния."
  CLT_TREE_PEAR:
    name: "Культивационное дерево: Груша"
    lore:
      - "Пара груш — для парности."
  CLT_TREE_CHERRY:
    name: "Культивационное дерево: Вишня"
    lore:
      - "Завяжи узелок!"
  CLT_TREE_KIWI:
    name: "Культивационное дерево: Киви"
    lore:
      - "Это из Новой Зеландии? Надеюсь, не ошибся."
  CLT_TREE_LIME:
    name: "Культивационное дерево: Лайм"
    lore:
      - "Знаете ли вы, что лайм — это просто лимон, задержавший дыхание?"
  CLT_TREE_CHESTNUT:
    name: "Культивационное дерево: Каштан"
    lore:
      - "Дерево, явно созданное для лазания."
  CLT_TREE_HAZELNUT:
    name: "Культивационное дерево: Лесной орех"
    lore:
      - "Трясти это дерево — любимое детское развлечение."
  CLT_TREE_PECAN:
    name: "Культивационное дерево: Пекан"
    lore:
      - "Можем ли мы вырастить это дерево? Да, мы пе-кан!"
  CLT_BUSH_GRAPE:
    name: "Культивационный куст: Виноград"
    lore:
      - "Спелый и сочный виноград, который сам"
      - "падает с куста."
  CLT_BUSH_PEANUTS:
    name: "Культивационный куст: Арахис"
    lore:
      - "Плотный, ароматный и богатый белком."
  CLT_BUSH_STRAWBERRY:
    name: "Культивационный куст: Клубника"
    lore:
      - "Плотная, ароматная и богатая белком."
  CLT_BUSH_RICE:
    name: "Культивационный куст: Рис"
    lore:
      - "Главная крупа всех времён."
  CLT_BUSH_GARLIC:
    name: "Культивационный куст: Чеснок"
    lore:
      - "У этого куста просто ужасный запах изо рта."
  CLT_BUSH_CAYENNE_PEPPER:
    name: "Культивационный куст: Кайенский перец"
    lore:
      - "Куст с перчинкой в характере."
  CLT_BUSH_TOMATO:
    name: "Культивационный куст: Помидор"
    lore:
      - "Спелый и готовый."
  CLT_BUSH_BELL_PEPPER:
    name: "Культивационный куст: Болгарский перец"
    lore:
      - "Осторожно проходите мимо — можно"
      - "нечаянно позвонить."
  CLT_BUSH_ONION:
    name: "Культивационный куст: Лук"
    lore:
      - "Неужели этот куст сейчас плачет?"
  CLT_BUSH_PEA:
    name: "Культивационный куст: Горох"
    lore:
      - "Предпочитаю Ку."
  CLT_BUSH_RAPESEED:
    name: "Культивационный куст: Рапс"
    lore:
      - "Этот куст источает какое-то маслянистое вещество."
  CLT_BUSH_LETTUCE:
    name: "Культивационный куст: Салат-латук"
    lore:
      - "Разве салат растёт на кустах?"
      - "Спойлер: нет, не растёт."
  CLT_BUSH_MUSTARD:
    name: "Культивационный куст: Семена горчицы"
    lore:
      - "Как огонь во рту."
  CLT_BUSH_BROCCOLI:
    name: "Культивационный куст: Брокколи"
    lore:
      - "Маленькие съедобные деревца? Кто это придумал?!"
  CLT_BUSH_CINNAMON:
    name: "Культивационный куст: Корица"
    lore:
      - "Восхитительно ароматный куст."
  CLT_BUSH_BASIL:
    name: "Культивационный куст: Базилик"
    lore:
      - "Лёгкий и причудливый куст."
  CLT_BUSH_BAY_LEAF:
    name: "Культивационный куст: Лавровый лист"
    lore:
      - "Запах этого куста разносится на километры."
  CLT_BUSH_CILANTRO:
    name: "Культивационный куст: Кинза"
    lore:
      - "От этого куста исходит лёгкий цитрусово-пряный аромат."
  CLT_BUSH_CHICORY:
    name: "Культивационный куст: Цикорий"
    lore:
      - "Я думал, цикорий — это корень? Этот аддон"
      - "вообще проводил исследования?!"
  CLT_BUSH_CHIVES:
    name: "Культивационный куст: Шнитт-лук"
    lore:
      - "Куст, производящий то, что по сути является"
      - "самым маленьким луком в мире."
  CLT_BUSH_CLOVE:
    name: "Культивационный куст: Гвоздика"
    lore:
      - "Этот куст напоминает мне о Рождестве."
  CLT_BUSH_CUMIN:
    name: "Культивационный куст: Тмин"
    lore:
      - "Куст с тёплым цитрусовым ароматом."
  CLT_BUSH_CHILLI_PEPPER:
    name: "Культивационный куст: Чили"
    lore:
      - "Даже глядя на этот куст, чувствую жжение на языке."
  CLT_BUSH_CURRY_LEAF:
    name: "Культивационный куст: Лист карри"
    lore:
      - "Лучше всего — слегка обжаренным всухую."
  CLT_BUSH_DILL:
    name: "Культивационный куст: Укроп"
    lore:
      - "Этот куст растёт значительно быстрее других."
  CLT_BUSH_FENNEL:
    name: "Культивационный куст: Фенхель"
    lore:
      - "Почему этот куст отпугивает насекомых?!"
  CLT_BUSH_GINGER:
    name: "Культивационный куст: Имбирь"
    lore:
      - "Этот куст хорош, если сварить его целиком."
  CLT_BUSH_HORSERADISH:
    name: "Культивационный куст: Хрен"
    lore:
      - "Хрен, растущий на кусте, — снова не вписывается в логику."
  CLT_BUSH_JASMINE:
    name: "Культивационный куст: Жасмин"
    lore:
      - "Аромат этого куста такой мягкий и нежный."
  CLT_BUSH_JUNIPER_BERRY:
    name: "Культивационный куст: Ягоды можжевельника"
    lore:
      - "Такие сладкие на кусте, такие острые в сушёном виде."
  CLT_BUSH_KAFFIR_LIME:
    name: "Культивационный куст: Каффир-лайм"
    lore:
      - "Куст, чьи листья ценятся больше плодов."
  CLT_BUSH_LAVENDER:
    name: "Культивационный куст: Лаванда"
    lore:
      - "Этот куст распространяет свой аромат повсюду."
  CLT_BUSH_LICORICE:
    name: "Культивационный куст: Лакрица"
    lore:
      - "Фу."
  CLT_BUSH_MACE:
    name: "Культивационный куст: Мускатный цвет"
    lore:
      - "Этот куст, похоже, отпугивает нападающих?"
  CLT_BUSH_MARJORAM:
    name: "Культивационный куст: Майоран"
    lore:
      - "Большой куст с древесным запахом."
  CLT_BUSH_MINT:
    name: "Культивационный куст: Мята"
    lore:
      - "Просто лучший запах среди кустов."
  CLT_BUSH_OREGANO:
    name: "Культивационный куст: Орегано"
    lore:
      - "Резкий запах этого куста отпугивает гостей."
  CLT_BUSH_PARSLEY:
    name: "Культивационный куст: Петрушка"
    lore:
      - "Брось этот куст в лаву. Сейчас же. :D"
  CLT_BUSH_ROSEMARY:
    name: "Культивационный куст: Розмарин"
    lore:
      - "Запах этого куста напоминает людям о воскресных обедах."
  CLT_BUSH_SASSAFRAS:
    name: "Культивационный куст: Сассафрас"
    lore:
      - "Этот куст любит расти рядом с небольшими"
      - "водоёмами."
  CLT_BUSH_SHISO:
    name: "Культивационный куст: Шисо"
    lore:
      - "Мне кажется, этот куст — дитя любви"
      - "мятного и базиликового кустов. Жаль,"
      - "что кусты не скрещиваются!"
  CLT_BUSH_STAR_ANISE:
    name: "Культивационный куст: Бадьян"
    lore:
      - "От этого куста исходит такой уникальный"
      - "анисовый аромат — просто не верится."
  CLT_BUSH_TARRAGON:
    name: "Культивационный куст: Эстрагон"
    lore:
      - "Этот куст не любит привлекать к себе внимание."
  CLT_BUSH_THYME:
    name: "Культивационный куст: Тимьян"
    lore:
      - "У этого куста постоянно заканчивается... Тимьян... *кашель*"
  CLT_BUSH_TURMERIC:
    name: "Культивационный куст: Куркума"
    lore:
      - "Уже держа этот куст в руках, чувствуешь"
      - "волну пряного аромата."
  CLT_BUSH_VANILLA:
    name: "Культивационный куст: Ваниль"
    lore:
      - "Этот куст растёт в основном рядом со Старбаксами."
  CLT_BUSH_WASABI:
    name: "Культивационный куст: Васаби"
    lore:
      - "Ещё один корень, растущий на кусте?"
      - "Вздох..."
  CLT_BUSH_ARTICHOKE:
    name: "Культивационный куст: Артишок"
    lore:
      - "Лучший куст для того, чтобы"
      - "душить художника. Вздох. Каламбуры — это сложно."
  CLT_BUSH_AUBERGINE:
    name: "Культивационный куст: Баклажан"
    lore:
      - "Я отказываюсь использовать слово eggplant. Просто отказываюсь."
  CLT_BUSH_ASPARAGUS:
    name: "Культивационный куст: Спаржа"
    lore:
      - "Этот куст спаржи — отличный"
      - "преследователь!"
  CLT_BUSH_BRUSSELS_SPROUTS:
    name: "Культивационный куст: Брюссельская капуста"
    lore:
      - "Куст, который иногда выделяет"
      - "токсичный газ."
  CLT_BUSH_CABBAGE:
    name: "Культивационный куст: Капуста"
    lore:
      - "Куст с огромным количеством"
      - "эмоциональной капусты."
  CLT_BUSH_CAULIFLOWER:
    name: "Культивационный куст: Цветная капуста"
    lore:
      - "Куст, способный производить маленькие облачка"
      - "радости."
  CLT_BUSH_CELERY:
    name: "Культивационный куст: Сельдерей"
    lore:
      - "Этот куст лишний."
      - "Сефираат не любит сельдерей."
  CLT_BUSH_KALE:
    name: "Культивационный куст: Кейл"
    lore:
      - "Когда сажаешь этот куст, чувствуешь,"
      - "что всё будет о-кейл."
  CLT_BUSH_SPINACH:
    name: "Культивационный куст: Шпинат"
    lore:
      - "Этот куст — лучший друг Папая."
  CLT_BUSH_BLACK_BEANS:
    name: "Культивационный куст: Чёрная фасоль"
    lore:
      - "Этот куст тихонько шепчет тебе:"
      - "Ты прекрасный человек-боб."
  CLT_BUSH_GREEN_BEANS:
    name: "Культивационный куст: Стручковая фасоль"
    lore:
      - "Полей этот куст томатным соусом —"
      - "получатся запечённые бобы."
  CLT_BUSH_CHICKPEAS:
    name: "Культивационный куст: Нут"
    lore:
      - "Куст, выведенный скрещиванием курицы"
      - "с горохом. НАУКА."
  CLT_BUSH_SOY_BEANS:
    name: "Культивационный куст: Соя"
    lore:
      - "Этот куст такой дружелюбный."
      - "Он делает меня со-счастливым."
  CLT_BUSH_PINTO_BEANS:
    name: "Культивационный куст: Пинто-фасоль"
    lore:
      - "Скоро мы выведем куст,"
      - "производящий буррито напрямую, правда?"
  CLT_BUSH_RUNNER_BEANS:
    name: "Культивационный куст: Вьющаяся фасоль"
    lore:
      - "У этого куста есть ноги?!"
  CLT_BUSH_NETTLES:
    name: "Культивационный куст: Крапива"
    lore:
      - "Осторожно, проходя сквозь этот куст!"
  CLT_BUSH_OKRA:
    name: "Культивационный куст: Бамия"
    lore:
      - "Признана овощем №1 по версии"
      - "Овощного клуба Окры Уинфри."
  CLT_BUSH_LEEK:
    name: "Культивационный куст: Порей"
    lore:
      - "Знаете ли вы, что порей — это просто лук,"
      - "который носит корсет? Чистая правда."
  CLT_BUSH_SHALLOT:
    name: "Культивационный куст: Лук-шалот"
    lore:
      - "Этот куст быстро производит чудесные мини-луковицы."
      - "К счастью, нужно их не так уж шалот."
  CLT_BUSH_JALAPENO:
    name: "Культивационный куст: Халапеньо"
    lore:
      - "Просто держа этот куст в руках, получаешь"
      - "1% шанс загореться."
  CLT_BUSH_RADICCHIO:
    name: "Культивационный куст: Радиккьо"
    lore:
      - "Хочешь звучать изысканно? Добавь радиккьо в любое"
      - "блюдо — это как капуста, но делает тебя"
      - "утончённым."
  CLT_BUSH_RHUBARB:
    name: "Культивационный куст: Ревень"
    lore:
      - "Знаете ли вы, что ревень — это овощ?"
      - "Я думал, это тип молотка."
  CLT_BUSH_CELERIAC:
    name: "Культивационный куст: Корень сельдерея"
    lore:
      - "Снова корень, растущий на кусте?"
      - "СефиГлупый™"
  CLT_BUSH_PARSNIP:
    name: "Культивационный куст: Пастернак"
    lore:
      - "Пропусти посредника и запеки куст"
      - "сразу целиком."
  CLT_BUSH_RUTABAGA:
    name: "Культивационный куст: Брюква"
    lore:
      - "Брюква. Просто брюква."
  CLT_BUSH_RADDISH:
    name: "Культивационный куст: Редиска"
    lore:
      - "Этот куст только что сделал трюк на скейтборде."
      - "Ред-и-ска."
  CLT_BUSH_SWEET_POTATO:
    name: "Культивационный куст: Сладкий картофель"
    lore:
      - "Этот куст такой милый. Говорят, он"
      - "делал тебе комплименты, пока ты не слышал."
  CLT_BUSH_TURNIP:
    name: "Культивационный куст: Репа"
    lore:
      - "По заявлению британского правительства,"
      - "этот куст решит все наши проблемы."
  CLT_BUSH_SWEETCORN:
    name: "Культивационный куст: Сладкая кукуруза"
    lore:
      - "Этот куст просто умоляет, чтобы из него"
      - "сделали лабиринт."
  CLT_BUSH_COURGETTE:
    name: "Культивационный куст: Кабачок"
    lore:
      - "Почему этот куст всё время кричит слово"
      - "Цукини? Наверное, американец?"
  CLT_BUSH_CUCUMBER:
    name: "Культивационный куст: Огурец"
    lore:
      - "Этот куст был создан исключительно для"
      - "твоего прекрасного летнего салата."
  CLT_BUSH_MARROW:
    name: "Культивационный куст: Тыква-кабачок"
    lore:
      - "Удивительно, что этот куст вообще"
      - "держится под собственным весом."
  CLT_BUSH_AVOCADO:
    name: "Культивационный куст: Авокадо"
    lore:
      - "Этот куст был специально выведен так,"
      - "чтобы потреблять как можно меньше воды."
  CLT_BUSH_GREEN_ONION:
    name: "Культивационный куст: Зелёный лук"
    lore:
      - "Он же — скаллион."
      - "Зелёный лук, как правило, мягче"
      - "на вкус, чем большинство других луков."
  CLT_BUSH_PEPPER:
    name: "Культивационный куст: Чёрный перец"
    lore:
      - "Чёрный перец играл важную роль в торговле"
      - "пряностями между Индией и Европой"
      - "ещё со времён Греции и Рима."
  CLT_PLANT_DARKNESS:
    name: "Первородное растение: Тьма"
    lore:
      - "Растение, кипящее необузданной"
      - "яростью."
      - ""
      - "Первородные растения не производят предметы"
      - "и используются только для скрещивания."
  CLT_PLANT_LIGHT:
    name: "Первородное растение: Свет"
    lore:
      - "Растение, излучающее ауру"
      - "чистой любви."
      - ""
      - "Первородные растения не производят предметы"
      - "и используются только для скрещивания."
  CLT_PLANT_EARTH:
    name: "Первородное растение: Земля"
    lore:
